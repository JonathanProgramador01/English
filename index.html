<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Interview Report & Personality Quiz</title>
    <!-- Bibliotecas externas vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(249, 115, 22, 0.1);
            box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.05);
        }

        .animated-bg {
            background: linear-gradient(-45deg, #fff7ed, #f8fafc, #fff1f2, #f8fafc);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .tab-transition {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lucide {
            stroke-width: 2.2px;
        }
    </style>
</head>
<body class="animated-bg min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const QUESTIONS = [
            { 
                id: 1, 
                text: "If it had been Friday afternoon, what would you have done?", 
                options: [
                    { label: "You would have stayed home watching movies and eating dessert.", value: "A" },
                    { label: "You would have gone out for a walk or something chill with friends.", value: "B" },
                    { label: "You would have looked for something fun or a little chaotic to do.", value: "C" },
                    { label: "You would have planned a nice dinner or a calm gathering.", value: "D" }
                ] 
            },
            { 
                id: 2, 
                text: "If someone had checked your social media, what would they have seen the most?", 
                options: [
                    { label: "Cute posts, memes, and sweet moments.", value: "A" },
                    { label: "Nature photos, chill vibes, or aesthetic content.", value: "B" },
                    { label: "Funny, chaotic, or spicy memes.", value: "C" },
                    { label: "Interesting things, culture, or thoughtful posts.", value: "D" }
                ] 
            },
            { 
                id: 3, 
                text: "If your friends had described your role in the group, what would they have said?", 
                options: [
                    { label: "You would have been the one who cheers everyone up.", value: "A" },
                    { label: "You would have been the calm and supportive one.", value: "B" },
                    { label: "You would have been the loud and fun one.", value: "C" },
                    { label: "You would have been the wise or responsible one.", value: "D" }
                ] 
            },
            { 
                id: 4, 
                text: "If someone had listened to your ideal playlist, what would they have found?", 
                options: [
                    { label: "Happy or nostalgic songs.", value: "A" },
                    { label: "Chill, indie, or relaxing music.", value: "B" },
                    { label: "Energetic or hype music.", value: "C" },
                    { label: "Deep, classic, or cinematic songs.", value: "D" }
                ] 
            },
            { 
                id: 5, 
                text: "If you had liked someone, what would you have done?", 
                options: [
                    { label: "You would have been sweet and a little shy.", value: "A" },
                    { label: "You would have tried to get to know them calmly.", value: "B" },
                    { label: "You would have flirted and joked a lot.", value: "C" },
                    { label: "You would have been respectful and thoughtful.", value: "D" }
                ] 
            },
            { 
                id: 6, 
                text: "If people had described your biggest personality trait, what would they have said?", 
                options: [
                    { label: "You would have been warm and positive.", value: "A" },
                    { label: "You would have been relaxed and balanced.", value: "B" },
                    { label: "You would have been bold and intense.", value: "C" },
                    { label: "You would have been thoughtful and mature.", value: "D" }
                ] 
            }
        ];

        const RESULTS_DATA = {
            A: { 
                title: "Sweet Tamal", 
                description: "You are cheerful, optimistic, and kind. You like making people feel good and you bring a positive vibe to the group.", 
                color: "from-pink-400 to-rose-500", 
                bgLight: "bg-pink-50",
                textColor: "text-pink-600",
                emoji: "💖" 
            },
            B: { 
                title: "Green Tamal", 
                description: "You are balanced and calm. People see you as reliable and easygoing, and you keep things relaxed.", 
                color: "from-emerald-500 to-teal-600", 
                bgLight: "bg-emerald-50",
                textColor: "text-emerald-600",
                emoji: "🍃" 
            },
            C: { 
                title: "Rajas Tamal", 
                description: "You are fun, bold, and a little intense. You enjoy excitement, joking around, and bringing energy to the group.", 
                color: "from-orange-500 to-red-600", 
                bgLight: "bg-orange-50",
                textColor: "text-orange-600",
                emoji: "🔥" 
            },
            D: { 
                title: "Mole Tamal", 
                description: "You are thoughtful and traditional. People see you as mature, reflective, and someone they respect.", 
                color: "from-amber-800 to-stone-900", 
                bgLight: "bg-amber-50",
                textColor: "text-amber-800",
                emoji: "🫔" 
            }
        };

        const INTERVIEW_REPORT = [
            { id: "001", question: "How long have you been in this area?", erickSaid: "I moved to this city four years ago, and I have been working in this specific administrative area for over three years.", reported: "Erick stated that he had moved to that city four years before and added that he had been working in that administrative area for over three years." },
            { id: "002", question: "Have you managed schedules in other companies?", erickSaid: "Yes, in my previous job, I managed complex schedules for a team of 30 employees while ensuring there were no overlaps.", reported: "He mentioned that in his previous job he had managed complex schedules for a team of 30 employees, ensuring that there were no overlaps." },
            { id: "003", question: "What is your level of English?", erickSaid: "I consider my English level to be intermediate-advanced because I usually communicate with international clients.", reported: "The candidate explained that he considered his English level to be intermediate-advanced as he usually communicated with international clients." },
            { id: "004", question: "Do you wait for indications or do you take decisions?", erickSaid: "I always value instructions, but if there is an emergency, I take my own decisions to keep the workflow moving.", reported: "Erick clarified that he always valued instructions, but noted that during emergencies, he took his own decisions." },
            { id: "005", question: "What does honesty mean to you?", erickSaid: "To me, honesty is the foundation of every professional relationship, so I always tell the truth about the budget.", reported: "He expressed that honesty was the foundation of every relationship and that he always told the truth about the budget." },
            { id: "006", question: "How do you manage office supplies?", erickSaid: "I use a customized digital system to track every item and I make sure we never run out of materials.", reported: "He said that he used a customized digital system to track every item and ensured they never ran out of materials." }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('quiz');
            const [step, setStep] = useState('home'); 
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [result, setResult] = useState(null);
            const [revealIndex, setRevealIndex] = useState(null);

            // Efecto para inicializar iconos cada vez que cambia el contenido
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 100);
                return () => clearTimeout(timer);
            }, [activeTab, step, revealIndex, currentQuestion]);

            const handleAnswer = (value) => {
                const newAnswers = [...answers, value];
                setAnswers(newAnswers);
                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const counts = newAnswers.reduce((acc, val) => { acc[val] = (acc[val] || 0) + 1; return acc; }, {});
                    const winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                    setResult(RESULTS_DATA[winner]);
                    setStep('result');
                }
            };

            return (
                <div className="max-w-6xl mx-auto py-8 px-4 flex flex-col items-center">
                    
                    {/* Navegación Unificada (Naranja) */}
                    <nav className="w-full max-w-xl bg-white/70 backdrop-blur-md rounded-[2rem] p-2 mb-12 shadow-xl border border-orange-100 flex items-center gap-2 z-50">
                        <button 
                            onClick={() => setActiveTab('quiz')} 
                            className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-[1.5rem] font-bold transition-all duration-300 ${activeTab === 'quiz' ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-500 hover:bg-orange-50'}`}
                        >
                            <i data-lucide="sparkles" className="w-4 h-4"></i>
                            <span>Quiz</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('english')} 
                            className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-[1.5rem] font-bold transition-all duration-300 ${activeTab === 'english' ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-500 hover:bg-orange-50'}`}
                        >
                            <i data-lucide="file-check" className="w-4 h-4"></i>
                            <span>Report</span>
                        </button>
                    </nav>

                    <main className="w-full flex justify-center">
                        {activeTab === 'quiz' ? (
                            <div className="w-full max-w-2xl tab-transition">
                                {step === 'home' && (
                                    <div className="glass-card rounded-[3rem] p-12 text-center relative overflow-hidden">
                                        <div className="bg-orange-50 w-32 h-32 rounded-full flex items-center justify-center mx-auto mb-8 text-6xl shadow-inner border border-orange-100">🫔</div>
                                        <h1 className="text-4xl md:text-5xl font-black text-slate-900 leading-tight mb-4">
                                            The <span className="text-orange-500">Tamal</span> Personality Test
                                        </h1>
                                        <p className="text-slate-500 text-lg mb-10 leading-relaxed max-w-sm mx-auto">Discover your professional archetype through conditional scenarios.</p>
                                        <button 
                                            onClick={() => setStep('quiz')} 
                                            className="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-orange-500 transition-all text-lg flex items-center justify-center gap-3"
                                        >
                                            Start Evaluation <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                )}

                                {step === 'quiz' && (
                                    <div className="glass-card rounded-[3rem] p-8 md:p-12 shadow-xl">
                                        <div className="flex items-center justify-between mb-10">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-1">Scenario</span>
                                                <span className="text-2xl font-black text-slate-800">{currentQuestion + 1} / {QUESTIONS.length}</span>
                                            </div>
                                            <div className="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div className="h-full bg-orange-500 transition-all duration-500" style={{ width: `${((currentQuestion + 1) / QUESTIONS.length) * 100}%` }}></div>
                                            </div>
                                        </div>
                                        <h2 className="text-2xl md:text-3xl font-extrabold text-slate-900 mb-10 leading-snug">{QUESTIONS[currentQuestion].text}</h2>
                                        <div className="grid gap-4">
                                            {QUESTIONS[currentQuestion].options.map((opt, i) => (
                                                <button 
                                                    key={i} 
                                                    onClick={() => handleAnswer(opt.value)} 
                                                    className="w-full text-left p-6 rounded-[1.5rem] border-2 border-slate-50 bg-white hover:border-orange-500 hover:shadow-lg transition-all flex items-center gap-4 group"
                                                >
                                                    <div className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center font-black text-slate-400 group-hover:bg-orange-500 group-hover:text-white transition-all">{opt.value}</div>
                                                    <span className="text-slate-700 font-semibold group-hover:text-slate-900">{opt.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 'result' && result && (
                                    <div className="tab-transition max-w-md mx-auto">
                                        <div className="bg-white rounded-[3rem] overflow-hidden shadow-2xl border border-orange-50">
                                            <div className={`bg-gradient-to-br ${result.color} p-14 text-center text-white`}>
                                                <div className="bg-white/20 backdrop-blur-md w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-5xl shadow-lg border border-white/20">{result.emoji}</div>
                                                <h2 className="text-5xl font-black mb-1 tracking-tight">{result.title}</h2>
                                                <p className="text-[10px] font-black uppercase tracking-[0.4em] opacity-70">The Verdict</p>
                                            </div>
                                            <div className="p-10 space-y-8 text-center">
                                                <p className={`p-6 ${result.bgLight} ${result.textColor} rounded-[2rem] font-bold text-lg leading-relaxed`}>"{result.description}"</p>
                                                <button onClick={() => {setStep('home'); setCurrentQuestion(0); setAnswers([]);}} className="w-full py-5 rounded-2xl bg-slate-900 text-white font-bold hover:bg-orange-600 transition-all flex items-center justify-center gap-3">
                                                    <i data-lucide="refresh-ccw" className="w-5 h-5"></i> Restart Test
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="w-full max-w-5xl tab-transition">
                                <div className="grid lg:grid-cols-12 gap-8">
                                    {/* Sidebar Unificado (Naranja/Ámbar) */}
                                    <aside className="lg:col-span-4 space-y-6">
                                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-orange-50">
                                            <div className="flex items-center gap-4 mb-8">
                                                <div className="bg-orange-600 w-16 h-16 rounded-[1.2rem] flex items-center justify-center text-white shadow-lg shadow-orange-100">
                                                    <i data-lucide="user-check" className="w-8 h-8"></i>
                                                </div>
                                                <div>
                                                    <h2 className="text-2xl font-black text-slate-900">Erick J.</h2>
                                                    <p className="text-slate-400 font-bold text-xs uppercase tracking-widest mt-0.5">Admin Candidate</p>
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <div className="p-4 bg-orange-50 rounded-2xl flex items-center justify-between border border-orange-100/50">
                                                    <span className="font-black text-orange-700 text-xs uppercase">Decision</span>
                                                    <span className="px-3 py-1 bg-orange-600 text-white text-[10px] font-black rounded-full">HIRED</span>
                                                </div>
                                                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-200/50 text-[11px] font-bold text-slate-500">
                                                    Logistics Management Assessment
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden group">
                                            <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                                                <i data-lucide="award" className="text-orange-400"></i> Assessment
                                            </h3>
                                            <p className="text-slate-400 text-sm leading-relaxed mb-8">The candidate demonstrated high proficiency in communication and technical administrative tasks.</p>
                                            <div className="bg-orange-500 p-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-orange-500/20">
                                                <i data-lucide="check-circle" className="w-5 h-5"></i>
                                                <span className="font-black text-sm uppercase">Verified Report</span>
                                            </div>
                                        </div>
                                    </aside>

                                    {/* Contenido del Reporte Unificado */}
                                    <section className="lg:col-span-8 space-y-4">
                                        <div className="flex items-center justify-between px-4 mb-2">
                                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Interview Documentation</h3>
                                            <span className="text-[10px] font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full">Reported Speech</span>
                                        </div>
                                        {INTERVIEW_REPORT.map((item, idx) => (
                                            <div key={idx} className="bg-white rounded-[2rem] p-6 shadow-lg border border-slate-100 transition-all hover:border-orange-200">
                                                <div className="flex items-center justify-between gap-4">
                                                    <div className="flex items-start gap-4">
                                                        <div className="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-[10px] font-black text-orange-400 border border-orange-100">#{item.id}</div>
                                                        <p className="text-slate-800 font-extrabold text-lg mt-1">"{item.question}"</p>
                                                    </div>
                                                    <button 
                                                        onClick={() => setRevealIndex(revealIndex === idx ? null : idx)} 
                                                        className={`shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center transition-all ${revealIndex === idx ? 'bg-orange-600 text-white rotate-180' : 'bg-slate-50 text-slate-400 hover:bg-orange-100'}`}
                                                    >
                                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                                    </button>
                                                </div>
                                                {revealIndex === idx && (
                                                    <div className="mt-6 space-y-4 animate-in slide-in-from-top-4 duration-300">
                                                        <div className="p-5 bg-slate-50 rounded-2xl border-l-4 border-orange-400">
                                                            <span className="text-[9px] font-black text-orange-400 uppercase tracking-widest block mb-2">Direct Answer</span>
                                                            <p className="text-sm text-slate-500 italic leading-relaxed">"{item.erickSaid}"</p>
                                                        </div>
                                                        <div className="p-6 bg-orange-600 text-white rounded-[1.5rem] shadow-xl shadow-orange-100">
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <i data-lucide="message-square" className="w-4 h-4 text-orange-200"></i>
                                                                <span className="text-[9px] font-black uppercase tracking-widest text-orange-200">Reported Narrative</span>
                                                            </div>
                                                            <p className="text-sm md:text-base font-semibold leading-relaxed">{item.reported}</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-20 text-slate-400 text-[9px] font-black uppercase tracking-[0.5em] text-center pb-12">
                        Professional Assessment &bull; 2024
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
